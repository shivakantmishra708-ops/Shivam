<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bio Website</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        margin:0;
        padding:0;
    }

    header{
        background:#222;
        color:white;
        text-align:center;
        padding:20px;
    }

    .container{
        width:90%;
        max-width:800px;
        margin:auto;
        margin-top:20px;
    }

    .card{
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,0.2);
        margin-bottom:20px;
    }

    h2{
        color:#333;
    }

    .bio p{
        font-size:18px;
    }

    .calculator{
        text-align:center;
    }

    #display{
        width:90%;
        height:50px;
        font-size:24px;
        margin-bottom:10px;
        text-align:right;
        padding-right:10px;
    }

    .btn{
        width:60px;
        height:60px;
        margin:5px;
        font-size:20px;
        border:none;
        border-radius:10px;
        background:#333;
        color:white;
        cursor:pointer;
    }

    .btn:hover{
        background:#555;
    }

    footer{
        text-align:center;
        padding:15px;
        background:#222;
        color:white;
    }
</style>
</head>

<body>

<header>
    <h1>My Personal Website</h1>
</header>

<div class="container">

    <div class="card bio">
        <h2>My Biodata</h2>

        <p><b>Name:</b> Shivakant Mishra</p>
        <p><b>Education:</b> BSc Mathematics</p>
        <p><b>City:</b> Lucknow</p>
        <p><b>Skills:</b> Python, HTML, GitHub</p>
        <p><b>Goal:</b> Software Developer</p>
    </div>

    <div class="card calculator">
        <h2>Calculator</h2>

        <input type="text" id="display" disabled>

        <br>

        <button class="btn" onclick="add('7')">7</button>
        <button class="btn" onclick="add('8')">8</button>
        <button class="btn" onclick="add('9')">9</button>
        <button class="btn" onclick="add('/')">/</button>

        <br>

        <button class="btn" onclick="add('4')">4</button>
        <button class="btn" onclick="add('5')">5</button>
        <button class="btn" onclick="add('6')">6</button>
        <button class="btn" onclick="add('*')">*</button>

        <br>

        <button class="btn" onclick="add('1')">1</button>
        <button class="btn" onclick="add('2')">2</button>
        <button class="btn" onclick="add('3')">3</button>
        <button class="btn" onclick="add('-')">-</button>

        <br>

        <button class="btn" onclick="add('0')">0</button>
        <button class="btn" onclick="calculate()">=</button>
        <button class="btn" onclick="clearDisplay()">C</button>
        <button class="btn" onclick="add('+')">+</button>

    </div>

</div>

<footer>
    © 2026 My Website
</footer>

<script>

function add(value){
    document.getElementById("display").value += value;
}

function calculate(){
    try{
        document.getElementById("display").value =
        eval(document.getElementById("display").value);
    }
    catch{
        alert("Invalid Input");
    }
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

</script>

</body>
</html>
